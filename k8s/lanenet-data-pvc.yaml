apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lanenet-data
  namespace: ucm-vista
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: lanenet-data-uploader
  namespace: ucm-vista
spec:
  restartPolicy: Never
  containers:
    - name: uploader
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 7d
      volumeMounts:
        - name: lanenet-data
          mountPath: /data
  volumes:
    - name: lanenet-data
      persistentVolumeClaim:
        claimName: lanenet-data
