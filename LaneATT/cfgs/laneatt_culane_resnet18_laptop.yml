# Laptop / CPU smoke-test config: trains LaneATT end-to-end on a tiny 20-image subset
# so the full pipeline (data -> aug -> forward -> loss -> backward -> checkpoint) can be
# verified locally before sending the code to a GPU server. Runs on CPU (auto-selected
# when CUDA is unavailable) or GPU unchanged.
# Model settings
val_every: 1          # large => no validation during the short run
model_checkpoint_interval: 1
seed: 0
num_workers: 0           # 0 workers: simplest/most reliable for a small CPU run
model:
  name: LaneATT
  parameters:
    backbone: resnet18
    S: &S 72
    topk_anchors: 100    # fewer anchors => much cheaper NMS on CPU
    anchors_freq_path: 'data/culane_anchors_freq.pt'
    img_h: &img_h 360
    img_w: &img_w 640
batch_size: 4
epochs: 20
loss_parameters: {}
train_parameters:
  conf_threshold:
  nms_thres: 15.
  nms_topk: 3000
test_parameters:
  conf_threshold: 0.5
  nms_thres: 50.
  nms_topk: &max_lanes 4
optimizer:
  name: Adam
  parameters:
    lr: 0.0003
lr_scheduler:
  name: CosineAnnealingLR
  parameters:
    T_max: 100           # ~= epochs(20) * iters_per_epoch(ceil(20/4)=5)

# Dataset settings
datasets:
  train:
    type: LaneDataset
    parameters:
      S: *S
      dataset: culane
      split: train
      img_size: [*img_h, *img_w]
      max_lanes: *max_lanes
      max_samples: 5    # only the first 20 training images
      normalize: false
      aug_chance: 1.0
      augmentations:
        - name: Affine
          parameters:
            translate_px:
             x: !!python/tuple [-25, 25]
             y: !!python/tuple [-10, 10]
            rotate: !!python/tuple [-6, 6]
            scale: !!python/tuple [0.85, 1.15]

      root: "/Users/amannindra/Projects/Auto/CuLaneDataset"

  test:
    type: LaneDataset
    parameters:
      S: *S
      dataset: culane
      split: test
      img_size: [*img_h, *img_w]
      max_lanes: *max_lanes
      max_samples: 20
      normalize: false
      aug_chance: 0
      augmentations:
      root: "/Users/amannindra/Projects/Auto/CuLaneDataset"

  val:
    type: LaneDataset
    parameters:
      S: *S
      dataset: culane
      split: val
      img_size: [288, 512]
      max_lanes: *max_lanes
      max_samples: 20
      normalize: false
      aug_chance: 0
      augmentations:
      root: "/Users/amannindra/Projects/Auto/CuLaneDataset"
