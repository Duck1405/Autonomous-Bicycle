apiVersion: batch/v1
kind: Job
metadata:
  name: hybridnets-train-ddp-a10
  namespace: ucm-vista
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-A10
      containers:
        - name: trainer
          image: pytorch/pytorch:2.5.1-cuda12.1-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /data/Autonomous-Bicycle/HybridNets
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euxo pipefail

              test -f train_ddp.py
              test -f projects/bdd100k_nrp.yaml
              test -d /data/100k_images
              test -d /data/100k
              test -d /data/bdd_seg_gt
              test -d /data/bdd_lane_gt

              export OMP_NUM_THREADS=1
              export MKL_NUM_THREADS=1
              export MPLCONFIGDIR=/tmp/matplotlib

              python -m pip install --upgrade pip
              python -m pip install --no-cache-dir --upgrade-strategy only-if-needed \
                "albumentations>=1.3,<2" \
                "matplotlib>=3.7,<4" \
                "numpy>=1.26,<2" \
                "opencv-python-headless>=4.8,<5" \
                "psutil>=5.9,<7" \
                "PyYAML>=6,<7" \
                "scipy>=1.10,<2" \
                "seaborn>=0.12,<1" \
                "tensorboardX>=2.6,<3" \
                "tqdm>=4.66,<5" \
                "webcolors>=1.13,<2"
              python -m pip install --no-cache-dir --no-deps \
                efficientnet_pytorch==0.7.1 \
                prefetch_generator==1.0.1 \
                pretrainedmodels==0.7.4 \
                timm==0.5.4

              python train_ddp.py \
                -p bdd100k_nrp \
                -bb tf_efficientnet_b3 \
                -b 2 \
                -n 2 \
                --freeze_backbone False \
                --freeze_det True \
                --freeze_seg False \
                --lr 0.0001 \
                --optim adamw \
                --num_epochs 2 \
                --save_interval 1000 \
                --val_interval 1 \
                --saved_path /data/hybridnets_models/live/checkpoints \
                --log_path /data/hybridnets/live/logs \
                --debug False \
                --cal_map False \
                --verbose True \
                --plots False \
                --num_gpus 2 \
                --amp True \
                --mosaic False \
                --gpu_memory_debug False
          resources:
            requests:
              cpu: "12"
              memory: 64Gi
              ephemeral-storage: 50Gi
              nvidia.com/gpu: "2"
            limits:
              cpu: "12"
              memory: 64Gi
              ephemeral-storage: 100Gi
              nvidia.com/gpu: "2"
          volumeMounts:
            - name: data
              mountPath: /data  
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lanenet-data